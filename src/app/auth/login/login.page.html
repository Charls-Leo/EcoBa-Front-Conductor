<ion-content [fullscreen]="true" class="login-content">
  <div class="login-page">
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>

    <div class="login-header">
      <div class="brand-wrap">
        <div class="brand-icon">
          <img src="assets/images/logo3.png" alt="Logo EcoBahía" class="brand-img" />
        </div>

        <div class="brand-text">
          <div class="brand-name">Eco<span>Bahía</span></div>
          <div class="brand-role">Acceso conductores</div>
        </div>
      </div>
    </div>

    <div class="login-main">
      <div class="login-card">
        <div class="card-badge">Bienvenido</div>

        <h1 class="login-title">Iniciar sesión</h1>
        <p class="login-subtitle">
          Accede para consultar tus rutas, recorridos y datos del perfil.
        </p>

        <!-- Error global del servidor -->
        <div class="server-error" *ngIf="errorMessage">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
          <div class="input-group">
            <label class="input-label">Correo electrónico</label>
            <ion-item lines="none" class="custom-item">
              <ion-input
                formControlName="email"
                type="email"
                placeholder="Ej: conductor@ecobahia.com"
                autocomplete="email">
              </ion-input>
            </ion-item>
            <div class="error-text" *ngIf="isFieldInvalid('email')">
              Ingresa un correo electrónico válido.
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">Contraseña</label>
            <ion-item lines="none" class="custom-item">
              <ion-input
                formControlName="password"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password">
              </ion-input>

              <button type="button" class="toggle-password" (click)="togglePassword()">
                {{ showPassword ? 'Ocultar' : 'Ver' }}
              </button>
            </ion-item>
            <div class="error-text" *ngIf="isFieldInvalid('password')">
              La contraseña debe tener al menos 4 caracteres.
            </div>
          </div>

          <div class="form-options">
            <label class="remember-check">
              <input type="checkbox" formControlName="remember" />
              <span>Recordarme</span>
            </label>
          </div>

          <button type="submit" class="login-btn" [disabled]="isLoading">
            <span *ngIf="!isLoading">Entrar</span>
            <span *ngIf="isLoading">Conectando...</span>
          </button>
        </form>

        <div class="register-box">
          <span>¿Aún no tienes cuenta?</span>
          <button type="button" class="register-link" (click)="goToRegister()">
            Registrarse
          </button>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-content [fullscreen]="true" class="section-content">
  <div class="section-page">

    <div class="section-header-bar">
      <button class="back-btn" (click)="goBack()" type="button">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="header-info">
        <div class="header-title">Rutas</div>
        <div class="header-subtitle">Rutas de recolección disponibles</div>
      </div>
      <div class="header-spacer"></div>
    </div>

    <div class="scroll-content">

      <!-- Loading -->
      <div class="loading-state" *ngIf="isLoading">
        <ion-spinner name="crescent" color="success"></ion-spinner>
        <div class="loading-text">Cargando rutas...</div>
      </div>

      <!-- Error -->
      <div class="empty-state" *ngIf="!isLoading && errorMsg">
        <div class="empty-icon-wrap">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
        </div>
        <div class="empty-title">{{ errorMsg }}</div>
      </div>

      <!-- Sin rutas -->
      <div class="empty-state" *ngIf="!isLoading && !errorMsg && rutas.length === 0">
        <div class="empty-icon-wrap">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
          </svg>
        </div>
        <div class="empty-title">Sin rutas</div>
        <div class="empty-text">
          No hay rutas de recolección registradas actualmente.
        </div>
      </div>

      <!-- Lista de rutas -->
      <div class="rutas-list" *ngIf="!isLoading && !errorMsg && rutas.length > 0">
        <div class="ruta-card" *ngFor="let ruta of rutas" (click)="verMapa(ruta.id)" style="cursor: pointer;">
          <div class="ruta-color" [style.background]="ruta.color_hex || '#3aad6f'"></div>
          <div class="ruta-info">
            <div class="ruta-name">{{ ruta.nombre_ruta || ruta.nombre || 'Ruta sin nombre' }}</div>
            <div class="ruta-id">ID: {{ ruta.id }}</div>
          </div>
          <div class="ruta-arrow">
            <svg viewBox="0 0 24 24">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </div>
        </div>
      </div>

    </div>



  </div>
</ion-content>

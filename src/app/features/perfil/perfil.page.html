<ion-content [fullscreen]="true" class="section-content">
  <div class="section-page">

    <div class="section-header-bar">
      <button class="back-btn" (click)="goBack()" type="button">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="header-info">
        <div class="header-title">Perfil</div>
        <div class="header-subtitle">Tu cuenta y preferencias</div>
      </div>
      <div class="header-spacer"></div>
    </div>

    <div class="scroll-content">

      <!-- No logueado -->
      <div class="empty-state" *ngIf="!isLoggedIn">
        <div class="empty-icon-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="empty-title">No has iniciado sesión</div>
        <div class="empty-text">
          Inicia sesión para ver tu información de conductor.
        </div>
        <button class="action-btn" (click)="setActiveNav('perfil')" type="button"
          style="margin-top: 16px; padding: 12px 28px; border: none; border-radius: 14px; background: linear-gradient(135deg, #3aad6f, #267a4e); color: white; font-weight: 700; font-size: 14px; cursor: pointer;">
          Iniciar sesión
        </button>
      </div>

      <!-- Perfil del usuario -->
      <div class="perfil-content" *ngIf="isLoggedIn && usuario">
        <div class="perfil-avatar-section">
          <div class="avatar-circle">
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="perfil-name">{{ usuario.nombre }} {{ usuario.apellido }}</div>
          <div class="perfil-role">Conductor</div>
        </div>

        <div class="perfil-details">
          <div class="detail-row">
            <div class="detail-label">Correo electrónico</div>
            <div class="detail-value">{{ usuario.email }}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">ID de usuario</div>
            <div class="detail-value">{{ usuario.id_usuario }}</div>
          </div>
          <div class="detail-row">
            <div class="detail-label">Rol</div>
            <div class="detail-value">Conductor (Rol {{ usuario.id_rol }})</div>
          </div>
        </div>

        <button class="logout-btn" (click)="cerrarSesion()" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Cerrar sesión
        </button>
      </div>

    </div>



  </div>
</ion-content>

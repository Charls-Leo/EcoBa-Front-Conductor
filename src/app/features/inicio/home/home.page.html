<ion-content [fullscreen]="true" class="home-content">
  <div class="home-page">

    <div class="top-bar">
      <div class="top-bar-logo">
        <div class="top-logo-icon">
          <img src="assets/images/logo3.png" alt="Logo EcoBahía" class="top-logo-img" />
        </div>
        <span class="top-logo-text">Eco<span>Bahía</span></span>
      </div>

      <div class="top-bar-actions">
        <button
          *ngIf="!isLoggedIn"
          class="login-top-btn"
          type="button"
          (click)="goToTopAction()">
          Iniciar sesión
        </button>

        <button
          *ngIf="isLoggedIn"
          class="icon-btn profile-btn"
          type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="scroll-content">
      <div class="greeting-section">
        <div class="greeting-name">Hola, <span>{{ userName }} 👋</span></div>
        <div class="greeting-sub">Tu panel de gestión de recolección</div>
      </div>

      <div class="banner-section">
        <div class="banner-card">
          <div class="banner-blob"></div>
          <div class="banner-blob2"></div>

          <div class="banner-text">
            <div class="banner-label">Hoy</div>
            <div class="banner-title">Recorrido<br>asignado 🚛</div>
            <button class="banner-cta" type="button" (click)="goTo('/recorridos')">Ver recorrido</button>
          </div>

          <div class="banner-illustration">
            <img src="assets/images/camión.png" alt="Camión de recolección" class="banner-truck-img" />
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Acceso rápido</span>
        <button class="section-link" type="button">Ver todo</button>
      </div>

      <div class="grid-section">
        <div class="quick-grid">
          <div
            class="quick-card"
            [ngClass]="item.cardClass"
            *ngFor="let item of quickAccess"
            (click)="goTo(item.route)">
            <div class="card-corner"></div>

            <div class="card-icon-wrap">
              <ng-container [ngSwitch]="item.icon">
                <svg *ngSwitchCase="'recorridos'" viewBox="0 0 24 24">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>

                <svg *ngSwitchCase="'routes'" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>

                <svg *ngSwitchCase="'map'" viewBox="0 0 24 24">
                  <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                  <line x1="8" y1="2" x2="8" y2="18"></line>
                  <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>

                <svg *ngSwitchCase="'profile'" viewBox="0 0 24 24">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>

                <svg *ngSwitchCase="'help'" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                  <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>

                <svg *ngSwitchCase="'report'" viewBox="0 0 24 24">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
              </ng-container>
            </div>

            <div class="card-label">{{ item.title }}</div>
            <div class="card-desc">{{ item.desc }}</div>
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Actividad reciente</span>
        <button class="section-link" type="button">Ver más</button>
      </div>

      <div class="activity-section">
        <div class="activity-list">
          <div class="activity-item" *ngFor="let activity of recentActivity">
            <div class="activity-icon" [style.background]="activity.bg">
              <ng-container [ngSwitch]="activity.icon">
                <svg *ngSwitchCase="'recorridos'" viewBox="0 0 24 24" [style.stroke]="activity.iconColor">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>

                <svg *ngSwitchCase="'routes'" viewBox="0 0 24 24" [style.stroke]="activity.iconColor">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>

                <svg *ngSwitchCase="'report'" viewBox="0 0 24 24" [style.stroke]="activity.iconColor">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
              </ng-container>
            </div>

            <div class="activity-text">
              <div class="activity-title">{{ activity.title }}</div>
              <div class="activity-sub">{{ activity.sub }}</div>
            </div>

            <span class="activity-badge" [ngClass]="activity.badgeClass">{{ activity.badge }}</span>
          </div>
        </div>
      </div>

      <div class="home-background-art">
        <img src="assets/images/imgFondo-home.png" alt="Fondo EcoBahía" class="home-background-img" />
      </div>
    </div>



  </div>
</ion-content>

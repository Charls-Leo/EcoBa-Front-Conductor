<ion-content [fullscreen]="true" class="home-content">
  <div class="home-page">

    <div class="top-bar">
      <div class="top-bar-logo">
        <div class="top-logo-icon">
          <img src="assets/images/logo3.png" alt="Logo EcoBahía" class="top-logo-img" />
        </div>
        <span class="top-logo-text">Eco<span>Bahía</span></span>
      </div>

      <div class="top-bar-actions">
        <button class="icon-btn" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <div class="notif-badge"></div>
        </button>

        <button class="icon-btn" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
      </div>
    </div>

    <div class="scroll-content">
      <div class="greeting-section">
        <div class="greeting-name">Hola, <span>Bienvenido 👋</span></div>
        <div class="greeting-sub">Gestiona los residuos de tu ciudad hoy</div>
      </div>

      <div class="banner-section">
        <div class="banner-card">
          <div class="banner-blob"></div>
          <div class="banner-blob2"></div>

          <div class="banner-text">
            <div class="banner-label">Esta semana</div>
            <div class="banner-title">Recolección<br>programada 🗓</div>
            <button class="banner-cta" type="button">Ver calendario</button>
          </div>

          <div class="banner-illustration">
            <img src="assets/images/camión.png" alt="Camión de recolección" class="banner-truck-img" />
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Acceso rápido</span>
        <button class="section-link" type="button">Ver todo</button>
      </div>

      <div class="grid-section">
        <div class="quick-grid">
          <div class="quick-card" [ngClass]="item.cardClass" *ngFor="let item of quickAccess">
            <div class="card-corner"></div>

            <div class="card-icon-wrap">
              <ng-container [ngSwitch]="item.icon">
                <svg *ngSwitchCase="'report'" viewBox="0 0 24 24">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>

                <svg *ngSwitchCase="'routes'" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>

                <svg *ngSwitchCase="'map'" viewBox="0 0 24 24">
                  <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                  <line x1="8" y1="2" x2="8" y2="18"></line>
                  <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>

                <svg *ngSwitchCase="'info'" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>

                <svg *ngSwitchCase="'help'" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                  <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>

                <svg *ngSwitchCase="'profile'" viewBox="0 0 24 24">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </ng-container>
            </div>

            <div class="card-label">{{ item.title }}</div>
            <div class="card-desc">{{ item.desc }}</div>
          </div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Actividad reciente</span>
        <button class="section-link" type="button">Ver más</button>
      </div>

      <div class="activity-section">
        <div class="activity-list">
          <div class="activity-item" *ngFor="let activity of recentActivity">
            <div class="activity-icon" [style.background]="activity.bg">
              <ng-container [ngSwitch]="activity.icon">
                <svg *ngSwitchCase="'report'" viewBox="0 0 24 24" [style.stroke]="activity.iconColor">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>

                <svg *ngSwitchCase="'map'" viewBox="0 0 24 24" [style.stroke]="activity.iconColor">
                  <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                </svg>

                <svg *ngSwitchCase="'info'" viewBox="0 0 24 24" [style.stroke]="activity.iconColor">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
              </ng-container>
            </div>

            <div class="activity-text">
              <div class="activity-title">{{ activity.title }}</div>
              <div class="activity-sub">{{ activity.sub }}</div>
            </div>

            <span class="activity-badge" [ngClass]="activity.badgeClass">{{ activity.badge }}</span>
          </div>
        </div>
      </div>

      <div class="home-background-art">
        <img src="assets/images/imgFondo-home.png" alt="Fondo EcoBahía" class="home-background-img" />
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-item" [class.active]="activeNav === 'inicio'" (click)="setActiveNav('inicio')" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="nav-label">Inicio</span>
      </button>

      <button class="nav-item" [class.active]="activeNav === 'reportes'" (click)="setActiveNav('reportes')" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <span class="nav-label">Reportes</span>
      </button>

      <button class="nav-item" [class.active]="activeNav === 'rutas'" (click)="setActiveNav('rutas')" type="button">
        <svg viewBox="0 0 24 24">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
        </svg>
        <span class="nav-label">Rutas</span>
      </button>

      <button class="nav-item" [class.active]="activeNav === 'info'" (click)="setActiveNav('info')" type="button">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
        <span class="nav-label">Info</span>
      </button>

      <button class="nav-item" [class.active]="activeNav === 'perfil'" (click)="setActiveNav('perfil')" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span class="nav-label">Perfil</span>
      </button>
    </div>

  </div>
</ion-content>

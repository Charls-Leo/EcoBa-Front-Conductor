<ion-content [fullscreen]="true" class="splash-content">
  <div class="phone-frame">
    <div id="splash">
      <div class="splash-blob splash-blob-1"></div>
      <div class="splash-blob splash-blob-2"></div>

      <div class="splash-logo-area">
        <div class="splash-logo-icon">
          <img src="assets/images/logo2.png" alt="Logo EcoBahía" class="logo-img" />
        </div>

        <div class="splash-brand">
          <div class="splash-app-name">Eco<span>Bahía</span></div>
          <div class="splash-tagline">Gestión inteligente.</div>
        </div>
      </div>

      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>

      <div id="redirect-note">Cargando experiencia…</div>

      <div class="splash-illustration">
        <img
          src="assets/images/img.inicio.jpeg"
          alt="Ilustración de inicio EcoBahía"
          class="splash-bottom-img"
        />
      </div>
    </div>
  </div>
</ion-content>
